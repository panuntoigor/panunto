<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmação de Presença – 1 Ano do Pedro</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Josefin+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --cream-light: #faf7f2;
    --stripe-blue: #b8cedd;
    --blue-dark: #2d5a72;
    --red: #c94a3a;
    --text: #2a3540;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background-color: var(--stripe-blue);
    background-image: repeating-linear-gradient(
      90deg,
      transparent 0px, transparent 18px,
      rgba(255,255,255,0.42) 18px, rgba(255,255,255,0.42) 22px
    );
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
    font-family: 'Josefin Sans', sans-serif;
  }

  .wrapper {
    width: 100%;
    max-width: 460px;
    animation: riseUp 0.65s cubic-bezier(.22,.68,0,1.2) both;
  }

  @keyframes riseUp {
    from { opacity:0; transform:translateY(32px) scale(0.97); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }

  /* ── Invite image on top ── */
  .invite-wrap {
    position: relative;
    border-radius: 24px 24px 0 0;
    overflow: hidden;
    box-shadow: 0 -4px 24px rgba(45,90,114,0.12);
  }

  .invite-img {
    width: 100%;
    display: block;
    border-radius: 24px 24px 0 0;
  }

  /* subtle vignette so card below blends */
  .invite-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom,
      transparent 55%,
      rgba(250,247,242,0.55) 80%,
      rgba(250,247,242,1) 100%
    );
  }

  /* ── Form card ── */
  .card {
    background: var(--cream-light);
    border-radius: 0 0 28px 28px;
    padding: 8px 36px 44px;
    box-shadow: 0 20px 56px rgba(45,90,114,0.18);
    position: relative;
  }

  .section-label {
    text-align: center;
    font-size: 10px;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: var(--red);
    font-weight: 600;
    margin-bottom: 22px;
    position: relative;
  }

  .section-label::before,
  .section-label::after {
    content: '✦';
    margin: 0 10px;
    opacity: 0.5;
    font-size: 9px;
  }

  /* ── Fields ── */
  .field {
    margin-bottom: 16px;
  }

  .field label {
    display: block;
    font-size: 9px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--blue-dark);
    margin-bottom: 6px;
  }

  .field input {
    width: 100%;
    background: var(--cream);
    border: 1.5px solid #dcd3c1;
    border-radius: 8px;
    padding: 12px 14px;
    font-family: 'Josefin Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s;
  }

  .field input:focus {
    border-color: var(--blue-dark);
    box-shadow: 0 0 0 3px rgba(45,90,114,0.1);
  }

  .field input::placeholder { color: #b8b0a3; }

  /* ── Confirm button ── */
  .btn-confirm {
    width: 100%;
    margin-top: 22px;
    padding: 15px 24px;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Josefin Sans', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.18s, transform 0.12s, box-shadow 0.18s;
    box-shadow: 0 6px 22px rgba(201,74,58,0.32);
    position: relative;
    overflow: hidden;
  }

  .btn-confirm::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 100%);
    pointer-events: none;
  }

  .btn-confirm:hover {
    background: #b5382a;
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(201,74,58,0.38);
  }

  .btn-confirm:active { transform: translateY(0); }

  /* ── Divider ── */
  .divider {
    border: none;
    border-top: 1px solid #e2d9cc;
    margin: 0 0 22px;
  }

  /* ── Footer ── */
  .footer {
    text-align: center;
    margin-top: 20px;
    font-size: 9px;
    letter-spacing: 2px;
    color: #c0b9aa;
    text-transform: uppercase;
  }

  /* ── Success screen ── */
  #success {
    display: none;
    text-align: center;
    padding: 10px 0 20px;
    animation: riseUp 0.5s ease both;
  }

  #success.show { display: block; }

  .success-emoji {
    font-size: 62px;
    display: block;
    margin-bottom: 12px;
    animation: pop 0.55s cubic-bezier(.22,.68,0,1.4) both 0.15s;
  }

  @keyframes pop {
    from { transform: scale(0.3); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .success-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-style: italic;
    color: var(--blue-dark);
    margin-bottom: 10px;
  }

  .success-sub {
    font-size: 11px;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: #999;
    line-height: 1.9;
  }

  .success-name {
    color: var(--red);
    font-weight: 700;
  }
</style>
</head>

  <!-- Form card -->
  <div class="card">
    <div id="form-area">
      <p class="section-label">Confirmação de Presença</p>

      <hr class="divider">

      <div class="field">
        <label>Nome completo</label>
        <input type="text" id="nome" placeholder="Seu nome" autocomplete="name" />
      </div>

      <div class="field">
        <label>Telefone / WhatsApp</label>
        <input type="tel" id="telefone" placeholder="(00) 00000-0000" inputmode="numeric" />
      </div>

      <button class="btn-confirm" onclick="confirmar()">
        🎉 &nbsp; Confirmar Presença
      </button>

      <p class="footer">12 de Julho &nbsp;·&nbsp; 1 Ano do Pedro &nbsp;·&nbsp; 🎀</p>
    </div>

    <div id="success">
      <span class="success-emoji">🎉</span>
      <div class="success-title">Presença confirmada!</div>
      <p class="success-sub">
        Obrigado, <span class="success-name" id="nome-confirmado"></span>!<br>
        Mal podemos esperar para celebrar<br>
        o <strong>1 aninho do Pedro</strong> com você.<br><br>
        📅 12 de Julho — anota na agenda!
      </p>
      <p class="footer" style="margin-top:24px">🎀 Até lá! 🎀</p>
    </div>
  </div>

</div>

<script>
  // Phone mask
  document.getElementById('telefone').addEventListener('input', function(e) {
    let v = e.target.value.replace(/\D/g, '').slice(0, 11);
    if (v.length > 6) v = '(' + v.slice(0,2) + ') ' + v.slice(2,7) + '-' + v.slice(7);
    else if (v.length > 2) v = '(' + v.slice(0,2) + ') ' + v.slice(2);
    else if (v.length > 0) v = '(' + v;
    e.target.value = v;
  });

  function confirmar() {
    const nome = document.getElementById('nome').value.trim();
    const tel  = document.getElementById('telefone').value.trim();

    if (!nome) { alert('Por favor, informe seu nome 😊'); return; }
    if (tel.replace(/\D/g,'').length < 10) { alert('Por favor, informe um telefone válido 📱'); return; }

    document.getElementById('nome-confirmado').textContent = nome.split(' ')[0];
    document.getElementById('form-area').style.display = 'none';
    document.getElementById('success').classList.add('show');
  }
</script>
